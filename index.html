<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🍻 打工人 · 工时精确 · 下班后归零</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f9f3e8 0%, #fff4e4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
            overflow-x: hidden;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 25px 45px -10px rgba(0, 0, 0, 0.15), 0 2px 8px rgba(0,0,0,0.05);
            padding: 28px 20px;
            border: 1px solid rgba(255,245,235,0.6);
            transition: all 0.2s;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #2d2a24;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        h1 span {
            background: #f1d5b5;
            font-size: 1.8rem;
            padding: 0 10px;
            border-radius: 60px;
            line-height: 1.3;
        }
        .sub {
            color: #7e6e5d;
            font-size: 0.95rem;
            font-weight: 400;
            margin-bottom: 20px;
            border-left: 4px solid #f3b37f;
            padding-left: 14px;
            background: rgba(243, 179, 127, 0.08);
            border-radius: 0 20px 20px 0;
        }
        .time-panel {
            background: #ffffffd6;
            border-radius: 36px;
            padding: 20px 16px;
            margin-bottom: 16px;
            border: 1px solid #ffeede;
            box-shadow: inset 0 2px 4px #fff9f0, 0 8px 18px -8px rgba(100,70,40,0.2);
        }
        .current-time-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fdefdb;
            padding: 12px 16px;
            border-radius: 100px;
            margin-bottom: 20px;
            color: #3e362e;
            font-weight: 500;
            flex-wrap: wrap;
            gap: 8px;
        }
        .current-time-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a76326;
        }
        .current-time-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
            background: #3e2e1e;
            color: #fbead0;
            padding: 6px 16px;
            border-radius: 60px;
            box-shadow: 0 4px 0 #1f160f;
            white-space: nowrap;
            max-width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: space-between;
        }
        .input-item {
            flex: 1 1 140px;
            min-width: 130px;
        }
        .input-item label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #664d38;
            margin-bottom: 6px;
            margin-left: 8px;
        }
        .input-item input[type="time"] {
            width: 100%;
            background: #fffbf5;
            border: 2px solid #ead6c2;
            border-radius: 40px;
            padding: 14px 16px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #2d241c;
            outline: none;
            transition: 0.2s;
            box-shadow: 0 5px 0 #d0b99e;
            -webkit-appearance: none;
            appearance: none;
        }
        .input-item input[type="time"]:focus {
            border-color: #f3a15d;
            box-shadow: 0 5px 0 #b57a42;
        }
        .input-item input[type="time"]::-webkit-date-and-time-value {
            text-align: left;
        }
        .rest-panel {
            background: #f1e4d6d6;
            border-radius: 30px;
            padding: 16px 16px 12px;
            margin: 8px 0 12px;
            border: 1px solid #f8cdae;
        }
        .rest-title {
            font-size: 1rem;
            font-weight: 600;
            color: #9b5f2e;
            margin-bottom: 8px;
            padding-left: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .next-target {
            background: #fbe9d8;
            border-radius: 30px;
            padding: 14px 18px;
            margin: 16px 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .next-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: #623f20;
        }
        .next-datetime {
            background: #2d241c;
            color: #ffdbb5;
            padding: 8px 18px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 3px 0 #0f0b07;
            white-space: nowrap;
            max-width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .countdown-block {
            background: #362f28;
            border-radius: 50px;
            padding: 24px 12px;
            text-align: center;
            margin: 8px 0 12px;
            box-shadow: 0 10px 0 #1d1712, inset 0 2px 10px #ffe1ae40;
        }
        .countdown-title {
            color: #c9ad8a;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .countdown-number {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.3;
            color: #fff1de;
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 0 4px 0 #a76529;
            word-break: break-word;
            white-space: normal;
        }
        .status-badge {
            display: inline-block;
            background: #eedac7;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #3e2a1a;
            box-shadow: 0 5px 0 #b28b64;
            margin: 4px 0 6px;
            width: auto;
            max-width: 100%;
        }
        .worked-badge {
            display: inline-block;
            background: #d8d0c0;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d3e3a;
            box-shadow: 0 4px 0 #8f7e6b;
            margin: 8px 0 4px;
            width: auto;
            max-width: 100%;
            font-family: 'JetBrains Mono', monospace;
        }
        .footer-note {
            text-align: center;
            color: #9b8a78;
            font-size: 0.85rem;
            margin-top: 20px;
            border-top: 1px dashed #e5cfbc;
            padding-top: 18px;
        }
        .footer-note button {
            background: none;
            border: 1px solid #ccb79f;
            border-radius: 40px;
            padding: 12px 24px;
            color: #6b4f37;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            background-color: #fcf3e9;
            box-shadow: 0 3px 0 #d0b99e;
            -webkit-tap-highlight-color: transparent;
        }
        .footer-note button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #d0b99e;
        }
        .footer-note button:hover {
            background: #cfb89d;
            color: white;
        }
        @media (max-width: 480px) {
            .card { padding: 22px 14px; }
            h1 { font-size: 1.8rem; }
            .current-time-value { font-size: 1.3rem; }
            .countdown-number { font-size: 1.9rem; }
            .input-item input[type="time"] { padding: 12px 12px; font-size: 1rem; }
            .next-datetime { font-size: 1rem; }
            .status-badge { font-size: 1.1rem; padding: 10px 20px; }
            .worked-badge { font-size: 1rem; padding: 8px 16px; }
        }
        @media (max-width: 360px) {
            .current-time-box { flex-direction: column; align-items: flex-start; }
            .current-time-value { align-self: flex-end; }
            .next-target { flex-direction: column; align-items: flex-start; }
            .next-datetime { align-self: flex-end; }
            .input-item { min-width: 100%; }
        }
        @media (orientation: landscape) and (max-height: 500px) {
            body { padding: 8px; align-items: flex-start; }
            .card { padding: 16px; }
            .input-group { flex-wrap: nowrap; }
            .countdown-block { padding: 16px; }
        }
        button, input { -webkit-tap-highlight-color: transparent; }
        .next-datetime::-webkit-scrollbar, .current-time-value::-webkit-scrollbar {
            height: 3px; background: transparent;
        }
        .next-datetime::-webkit-scrollbar-thumb, .current-time-value::-webkit-scrollbar-thumb {
            background: #b28b64; border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        <span>⏳</span> 工时·午休·秒动
    </h1>
    <div class="sub">精确到秒 · 下班后自动归零 · 移动优化</div>

    <!-- 当前时间显示 -->
    <div class="current-time-box">
        <span class="current-time-label">现在时刻</span>
        <span class="current-time-value" id="liveClock">--:--:--</span>
    </div>

    <!-- 上下班输入 -->
    <div class="time-panel">
        <div class="input-group">
            <div class="input-item">
                <label>🟢 上班</label>
                <input type="time" id="startTime" value="09:00">
            </div>
            <div class="input-item">
                <label>🔴 下班</label>
                <input type="time" id="endTime" value="18:00">
            </div>
        </div>
    </div>

    <!-- 午休时间设置 -->
    <div class="rest-panel">
        <div class="rest-title">😴 午休时段（扣除不计入工时）</div>
        <div class="input-group">
            <div class="input-item">
                <label>🌅 开始</label>
                <input type="time" id="restStart" value="12:00">
            </div>
            <div class="input-item">
                <label>🌄 结束</label>
                <input type="time" id="restEnd" value="13:00">
            </div>
        </div>
    </div>

    <!-- 下次下班具体时刻 -->
    <div class="next-target">
        <span class="next-label">⏰ 下次下班</span>
        <span class="next-datetime" id="nextEndTime">----/--/-- --:--</span>
    </div>

    <!-- 倒计时大屏（含秒） -->
    <div class="countdown-block">
        <div class="countdown-title">距离下班还剩</div>
        <div class="countdown-number" id="countdownDisplay">0小时0分0秒</div>
    </div>

    <!-- 状态标签 + 已工作时长 -->
    <div style="text-align: center;">
        <span class="status-badge" id="workStatus">⚡ 计算中...</span>
    </div>
    <div style="text-align: center;">
        <span class="worked-badge" id="workedDisplay">已工作 --小时--分--秒</span>
    </div>

    <!-- 底部小工具：重置默认值 + 说明 -->
    <div class="footer-note">
        <button id="resetDefault">🔄 重置 09:00–18:00 午休12:00–13:00</button>
        <p style="margin-top: 12px;">💡 下班后倒计时归零 · 工时扣除午休 · 跨天支持</p>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const startInput = document.getElementById('startTime');
        const endInput = document.getElementById('endTime');
        const restStartInput = document.getElementById('restStart');
        const restEndInput = document.getElementById('restEnd');
        const liveClockSpan = document.getElementById('liveClock');
        const nextEndSpan = document.getElementById('nextEndTime');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const workStatusSpan = document.getElementById('workStatus');
        const workedDisplay = document.getElementById('workedDisplay');
        const resetBtn = document.getElementById('resetDefault');

        const STORAGE_KEY = 'workTimeConfigV3'; // 新版本存储键

        // 加载保存的时间
        function loadSavedTimes() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const { start, end, restStart, restEnd } = JSON.parse(saved);
                    if (start) startInput.value = start;
                    if (end) endInput.value = end;
                    if (restStart) restStartInput.value = restStart;
                    if (restEnd) restEndInput.value = restEnd;
                } catch (e) {}
            } else {
                // 默认值
                startInput.value = '09:00';
                endInput.value = '18:00';
                restStartInput.value = '12:00';
                restEndInput.value = '13:00';
            }
        }

        // 保存所有时间
        function saveTimes() {
            const config = {
                start: startInput.value,
                end: endInput.value,
                restStart: restStartInput.value,
                restEnd: restEndInput.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        }

        // 重置默认
        function resetToDefault() {
            startInput.value = '09:00';
            endInput.value = '18:00';
            restStartInput.value = '12:00';
            restEndInput.value = '13:00';
            saveTimes();
            updateRemaining();
        }

        // 监听变化
        [startInput, endInput, restStartInput, restEndInput].forEach(inp => {
            inp.addEventListener('change', () => { saveTimes(); updateRemaining(); });
            inp.addEventListener('input', () => { saveTimes(); updateRemaining(); });
        });
        resetBtn.addEventListener('click', resetToDefault);

        // 解析 "HH:MM"
        function parseTimeStr(timeStr) {
            if (!timeStr || !timeStr.includes(':')) return null;
            const parts = timeStr.split(':');
            const hour = parseInt(parts[0], 10);
            const minute = parseInt(parts[1], 10);
            if (isNaN(hour) || isNaN(minute)) return null;
            return { hour, minute };
        }

        // 根据基准日期构建Date
        function buildDateFromBase(baseDate, hour, minute) {
            const d = new Date(baseDate);
            d.setHours(hour, minute, 0, 0);
            return d;
        }

        // 获取下班时间（考虑跨天）
        function getEndDateForBase(baseDate, startHour, startMin, endHour, endMin) {
            const startDate = buildDateFromBase(baseDate, startHour, startMin);
            let endDate = buildDateFromBase(baseDate, endHour, endMin);
            if (endDate <= startDate) {
                endDate.setDate(endDate.getDate() + 1);
            }
            return endDate;
        }

        // 核心计算：返回 nextEnd, status, currentShiftStart, currentShiftEnd
        function computeDetails(now, startStr, endStr) {
            const startTime = parseTimeStr(startStr);
            const endTime = parseTimeStr(endStr);
            if (!startTime || !endTime) return null;

            const { hour: sH, minute: sM } = startTime;
            const { hour: eH, minute: eM } = endTime;

            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            const today = new Date(now);
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);

            // 下班候选
            const endYesterday = getEndDateForBase(yesterday, sH, sM, eH, eM);
            const endToday = getEndDateForBase(today, sH, sM, eH, eM);
            const endTomorrow = getEndDateForBase(tomorrow, sH, sM, eH, eM);
            const candidates = [endYesterday, endToday, endTomorrow].filter(d => d > now);
            if (candidates.length === 0) return null;
            const nextEnd = new Date(Math.min(...candidates.map(d => d.getTime())));

            // 构建班次区间
            const startYesterday = buildDateFromBase(yesterday, sH, sM);
            const endYesterdayInterval = getEndDateForBase(yesterday, sH, sM, eH, eM);
            const startToday = buildDateFromBase(today, sH, sM);
            const endTodayInterval = getEndDateForBase(today, sH, sM, eH, eM);

            const inYesterday = (now >= startYesterday && now < endYesterdayInterval);
            const inToday = (now >= startToday && now < endTodayInterval);

            let status, currentShiftStart = null, currentShiftEnd = null;
            if (inYesterday) {
                status = '上班中 💼';
                currentShiftStart = startYesterday;
                currentShiftEnd = endYesterdayInterval;
            } else if (inToday) {
                status = '上班中 💼';
                currentShiftStart = startToday;
                currentShiftEnd = endTodayInterval;
            } else {
                if (now < startToday && !inYesterday) {
                    status = '未上班 🌅';
                } else {
                    status = '已下班 🎉';
                }
            }

            return { nextEnd, status, currentShiftStart, currentShiftEnd };
        }

        // 计算已工作秒数（扣除午休）
        function calculateWorkedSeconds(now, shiftStart, shiftEnd, restStartObj, restEndObj) {
            if (!shiftStart || now < shiftStart) return 0;

            // 基于班次开始日期构建午休起止
            const restStart = new Date(shiftStart);
            restStart.setHours(restStartObj.hour, restStartObj.minute, 0, 0);
            const restEnd = new Date(shiftStart);
            restEnd.setHours(restEndObj.hour, restEndObj.minute, 0, 0);

            if (restEnd <= restStart) {
                restEnd.setDate(restEnd.getDate() + 1);
            }

            // 裁剪到班次区间
            const shiftStartMs = shiftStart.getTime();
            const shiftEndMs = shiftEnd.getTime();
            const restStartMs = Math.max(restStart.getTime(), shiftStartMs);
            const restEndMs = Math.min(restEnd.getTime(), shiftEndMs);

            const nowMs = now.getTime();
            let workedEndMs = Math.min(nowMs, shiftEndMs);
            if (nowMs > restStartMs && nowMs < restEndMs) {
                workedEndMs = restStartMs;
            }

            let totalWorkMs = workedEndMs - shiftStartMs;
            const restIntersectStart = Math.max(restStartMs, shiftStartMs);
            const restIntersectEnd = Math.min(restEndMs, workedEndMs);
            const restDurationMs = Math.max(0, restIntersectEnd - restIntersectStart);

            const workedMs = totalWorkMs - restDurationMs;
            return Math.max(0, Math.floor(workedMs / 1000));
        }

        // 格式化剩余时间
        function formatRemaining(ms) {
            if (ms < 0) return '0小时0分0秒';
            const totalSeconds = Math.floor(ms / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            let result = '';
            if (days > 0) result += `${days}天`;
            result += `${hours}小时${minutes}分${seconds}秒`;
            return result;
        }

        // 格式化已工作时长
        function formatWorked(seconds) {
            if (seconds < 0) return '--小时--分--秒';
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            let result = '';
            if (days > 0) result += `${days}天`;
            result += `${hours}小时${minutes}分${secs}秒`;
            return result;
        }

        function formatNextEnd(d) {
            if (!d) return '--/--/-- --:--';
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2,'0');
            const day = String(d.getDate()).padStart(2,'0');
            const hours = String(d.getHours()).padStart(2,'0');
            const mins = String(d.getMinutes()).padStart(2,'0');
            return `${year}/${month}/${day} ${hours}:${mins}`;
        }

        function updateClock() {
            const now = new Date();
            const y = now.getFullYear();
            const M = String(now.getMonth()+1).padStart(2,'0');
            const d = String(now.getDate()).padStart(2,'0');
            const hh = String(now.getHours()).padStart(2,'0');
            const mm = String(now.getMinutes()).padStart(2,'0');
            const ss = String(now.getSeconds()).padStart(2,'0');
            liveClockSpan.textContent = `${y}/${M}/${d} ${hh}:${mm}:${ss}`;
        }

        function updateRemaining() {
            const now = new Date();
            const startVal = startInput.value;
            const endVal = endInput.value;
            const restStartVal = restStartInput.value;
            const restEndVal = restEndInput.value;

            if (!startVal || !endVal) {
                nextEndSpan.textContent = '--/--/-- --:--';
                countdownDisplay.textContent = '请设置时间';
                workStatusSpan.textContent = '⏳ 等待输入';
                workedDisplay.textContent = '已工作 --小时--分--秒';
                return;
            }

            const details = computeDetails(now, startVal, endVal);
            if (!details) {
                nextEndSpan.textContent = '--/--/-- --:--';
                countdownDisplay.textContent = '时间格式有误';
                workStatusSpan.textContent = '⚠️ 错误';
                workedDisplay.textContent = '已工作 --小时--分--秒';
                return;
            }

            const { nextEnd, status, currentShiftStart, currentShiftEnd } = details;

            // 下次下班时间始终显示（用于参考）
            nextEndSpan.textContent = formatNextEnd(nextEnd);

            // 根据状态设置倒计时和已工作时长
            if (status === '已下班 🎉') {
                // 下班后：倒计时归零/下班提示，工作时长占位
                countdownDisplay.textContent = '下班啦 🎉';
                workStatusSpan.textContent = status;
                workedDisplay.textContent = '已工作 --小时--分--秒';
            } else if (status === '未上班 🌅') {
                // 未上班：倒计时显示今天下班剩余，工作时长占位
                const remainingMs = nextEnd - now;
                countdownDisplay.textContent = formatRemaining(remainingMs);
                workStatusSpan.textContent = status;
                workedDisplay.textContent = '已工作 --小时--分--秒';
            } else if (status === '上班中 💼') {
                // 上班中：正常倒计时（距离当前班次结束）
                if (currentShiftEnd) {
                    const remainingMs = currentShiftEnd - now;
                    countdownDisplay.textContent = formatRemaining(remainingMs);
                } else {
                    countdownDisplay.textContent = '计算异常';
                }
                workStatusSpan.textContent = status;

                // 计算已工作时长
                if (currentShiftStart && currentShiftEnd) {
                    const restStartObj = parseTimeStr(restStartVal);
                    const restEndObj = parseTimeStr(restEndVal);
                    if (restStartObj && restEndObj) {
                        const workedSeconds = calculateWorkedSeconds(now, currentShiftStart, currentShiftEnd, restStartObj, restEndObj);
                        workedDisplay.textContent = `已工作 ${formatWorked(workedSeconds)}`;
                    } else {
                        // 无有效午休，按全时段
                        const totalSeconds = Math.floor((Math.min(now.getTime(), currentShiftEnd.getTime()) - currentShiftStart.getTime()) / 1000);
                        workedDisplay.textContent = `已工作 ${formatWorked(Math.max(0, totalSeconds))}`;
                    }
                } else {
                    workedDisplay.textContent = '已工作 --小时--分--秒';
                }
            } else {
                // 兜底
                countdownDisplay.textContent = formatRemaining(nextEnd - now);
                workStatusSpan.textContent = status;
                workedDisplay.textContent = '已工作 --小时--分--秒';
            }
        }

        function tick() {
            updateClock();
            updateRemaining();
        }

        let timer = setInterval(tick, 1000);
        loadSavedTimes();
        tick();

        window.addEventListener('beforeunload', () => clearInterval(timer));
    })();
</script>
</body>
</html>
